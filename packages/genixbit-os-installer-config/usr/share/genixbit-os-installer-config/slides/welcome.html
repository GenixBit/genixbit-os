<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to GenixBit OS</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 16px 0;
      background: linear-gradient(to right, #818cf8, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      max-width: 480px;
      margin: 0;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6366F1" />
        <stop offset="50%" stop-color="#D946EF" />
        <stop offset="100%" stop-color="#06B6D4" />
      </linearGradient>
    </defs>
    <path d="M150,256 C150,170 210,130 256,256 C302,382 362,342 362,256 C362,170 302,130 256,256 C210,382 150,342 150,256 Z" 
          fill="none" stroke="url(#g)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="256" cy="256" r="28" fill="url(#g)" />
  </svg>
  <h1>Welcome to GenixBit OS</h1>
  <p>Installing your new intelligence-first operating system. Built for advanced agents, modern developer workflows, and premium system control.</p>
</body>
</html>

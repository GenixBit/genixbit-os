<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to GenixBit OS</title>
  <style>
    body {
      background: linear-gradient(135deg, #061321 0%, #0B1E31 100%);
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 20px rgba(0, 188, 235, 0.4));
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(to right, #087FA5, #00BCEB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 18px;
      font-weight: 600;
      color: #00BCEB;
      margin: 0 0 24px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      max-width: 480px;
      margin: 0;
      color: #DDF7FC;
    }
  </style>
</head>
<body>
  <img class="logo" src="../branding/genixbit-logo.svg" alt="GenixBit OS Logo" />
  <h1>Welcome to GenixBit OS 0.2.0-alpha</h1>
  <div class="tagline">Innovate. Integrate. Illuminate</div>
  <p>Installing your new intelligence-first operating system. Built for advanced agents, modern developer workflows, and premium system control.</p>
</body>
</html>

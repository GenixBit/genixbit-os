<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  <!-- stylized orbital infinity structure -->
  <path d="M150,256 C150,170 210,130 256,256 C302,382 362,342 362,256 C362,170 302,130 256,256 C210,382 150,342 150,256 Z" 
        fill="none" stroke="url(#grad1)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Center Core -->
  <circle cx="256" cy="256" r="28" fill="url(#grad1)" filter="url(#glow)" />
</svg>

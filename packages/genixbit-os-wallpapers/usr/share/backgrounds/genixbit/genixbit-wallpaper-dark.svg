<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070C" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
    <filter id="blur-bg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)" />
  
  <!-- Glowing Blobs -->
  <circle cx="400" cy="300" r="500" fill="url(#glow1)" filter="url(#blur-bg)" />
  <circle cx="1500" cy="800" r="500" fill="url(#glow2)" filter="url(#blur-bg)" />
  
  <!-- Subtle Lines / Mesh -->
  <path d="M -100,540 C 300,200 700,800 1100,540 C 1500,280 1700,700 2020,540" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.1" />
  <path d="M -100,640 C 400,940 800,340 1200,640 C 1600,940 1700,440 2020,640" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.08" />

  <!-- Logo Mark at the Center -->
  <g transform="translate(860, 440) scale(0.39)">
    <path d="M150,256 C150,170 210,130 256,256 C302,382 362,342 362,256 C362,170 302,130 256,256 C210,382 150,342 150,256 Z" 
          fill="none" stroke="url(#logo-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" />
    <circle cx="256" cy="256" r="22" fill="url(#logo-grad)" opacity="0.3" />
  </g>
</svg>

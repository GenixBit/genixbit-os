name: Infrastructure Validation

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'test/**'
    paths:
      - 'infra/package-staging/**'
      - 'docs/PACKAGE-STAGING-*.md'
      - 'docs/staging/**'
      - '.github/workflows/infrastructure-validation.yml'
      - 'tests/infrastructure/**'
      - 'tools/repository/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/package-staging/**'
      - 'docs/PACKAGE-STAGING-*.md'
      - 'docs/staging/**'
      - '.github/workflows/infrastructure-validation.yml'
      - 'tests/infrastructure/**'
      - 'tools/repository/**'

permissions:
  contents: read

jobs:
  validate-infrastructure:
    name: Infrastructure Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install ShellCheck and Packaging tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq gpg curl python3-jsonschema

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Print OpenTofu version
        run: |
          tofu version

      - name: Check OpenTofu code formatting
        run: |
          tofu fmt -check -recursive infra/package-staging

      - name: Initialize and validate OpenTofu configuration
        run: |
          tofu -chdir=infra/package-staging init -backend=false
          tofu -chdir=infra/package-staging validate

      - name: Validate shell syntax for deployment scripts
        run: |
          bash -n infra/package-staging/scripts/*.sh infra/package-staging/scripts/lib/*.sh

      - name: Run ShellCheck on deployment scripts
        run: |
          shellcheck -e SC1091 infra/package-staging/scripts/*.sh infra/package-staging/scripts/lib/*.sh

      - name: Run infrastructure security and rules test suite
        run: |
          bash tests/infrastructure/test-infrastructure-security-rules.sh

      - name: Verify plan and evidence JSON schema validity
        run: |
          jq . infra/package-staging/schemas/plan-manifest.schema.json
          jq . infra/package-staging/schemas/staging-evidence.schema.json

      - name: Run staging evidence anti-fabrication test suite
        run: |
          bash tests/infrastructure/test-staging-evidence.sh

      - name: Run staging operations behavioral test suite
        run: |
          bash tests/infrastructure/test-staging-operations.sh

      - name: Run evidence anti-fabrication static analysis checks
        run: |
          # 1. Verify NO unconditional PASS markers in production operational scripts
          if grep -rn 'echo "STAGING_.*=PASS"' infra/package-staging/scripts/*.sh | grep -v emit_verified_marker; then
            echo "Error: Detected unconditional STAGING_*=PASS echo in operational scripts!" >&2
            exit 1
          fi
          if grep -rn 'export STAGING_.*=PASS' infra/package-staging/scripts/*.sh; then
            echo "Error: Detected unconditional STAGING_*=PASS export in operational scripts!" >&2
            exit 1
          fi

          # 2. Verify Key Recovery imports keys
          if ! grep -E 'gpg.*import|restore' infra/package-staging/scripts/validate-key-recovery.sh >/dev/null; then
            echo "Error: validate-key-recovery.sh missing import or restore operation!" >&2
            exit 1
          fi

          # 3. Verify Key Revocation applies revocation certificate
          if ! grep -E 'gen-revoke|import' infra/package-staging/scripts/validate-key-revocation.sh >/dev/null; then
            echo "Error: validate-key-revocation.sh missing revocation certificate operations!" >&2
            exit 1
          fi

          # 4. Verify Snapshot calls verify-snapshot.sh
          if ! grep 'verify-snapshot.sh' infra/package-staging/scripts/validate-snapshot.sh >/dev/null; then
            echo "Error: validate-snapshot.sh missing verify-snapshot.sh call!" >&2
            exit 1
          fi

          # 5. Verify Tamper Rejection does NOT mutate production-like current endpoint
          if grep 'dists/resolute-alpha' infra/package-staging/scripts/validate-tamper-rejection.sh | grep '/var/srv/genixbit-repository/current'; then
            echo "Error: validate-tamper-rejection.sh mutates live production endpoint!" >&2
            exit 1
          fi

          # 6. Verify Leaf Cert Verification & APPROVED_CERT_FPR in validate-client.sh
          if ! grep 'STAGING_LEAF_CERT' infra/package-staging/scripts/validate-client.sh >/dev/null || ! grep 'APPROVED_CERT_FPR' infra/package-staging/scripts/validate-client.sh >/dev/null; then
            echo "Error: validate-client.sh missing leaf TLS cert or APPROVED_CERT_FPR verification!" >&2
            exit 1
          fi

          # 7. Verify collect-evidence checks observations & cleanup
          if ! grep 'observations' infra/package-staging/scripts/collect-evidence.sh >/dev/null || ! grep 'cleanup' infra/package-staging/scripts/collect-evidence.sh >/dev/null; then
            echo "Error: collect-evidence.sh missing observation or cleanup closure verification!" >&2
            exit 1
          fi

          # 8. Verify configure-repository.sh does not use quoted wildcards in scp
          if grep 'scp.*\*"' infra/package-staging/scripts/configure-repository.sh >/dev/null; then
            echo "Error: configure-repository.sh uses quoted wildcard in scp!" >&2
            exit 1
          fi

      - name: Verify absence of tracked state, plans, tfvars or credentials
        run: |
          if git ls-files | grep -E '(\.tfstate|\.tfplan|terraform\.tfvars|backend\.hcl|crash\.log)$'; then
            echo "Error: Detected tracked terraform state, plan, or secret file!" >&2
            exit 1
          fi

      - name: Verify absence of committed private keys or secrets
        run: |
          if find infra/package-staging -type f \( -name "*.pem" -o -name "*.key" -o -name "*.sec" -o -name "*.tfvars" \) | grep .; then
            echo "Error: Detected committed private key or tfvars file in infra/package-staging!" >&2
            exit 1
          fi

  real-mode-staging-integration:
    name: Real-Mode Staging Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Verify Docker daemon availability & print version
        run: |
          docker info
          docker version

      - name: Pull Ubuntu 26.04 container image & record digest
        run: |
          UBUNTU_IMAGE="${UBUNTU_2604_IMAGE:-ubuntu:26.04}"
          docker pull "$UBUNTU_IMAGE"
          echo "=== Container Image Inspection ==="
          docker image inspect "$UBUNTU_IMAGE" | jq -r '.[0] | {Id: .Id, RepoDigests: .RepoDigests, Architecture: .Architecture, Created: .Created}'

      - name: Install Host Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gpg jq openssl tar curl dpkg-dev apt-utils python3-jsonschema

      - name: Execute Real-Mode Staging Integration Harness
        run: |
          timeout 45m bash tests/infrastructure/test-staging-real-mode-local.sh 2>&1 | tee integration.log

      - name: Verify Required Evidence Markers
        run: |
          REQUIRED_MARKERS=(
            "REAL_MODE_SIGNER_SEPARATION=PASS"
            "REAL_MODE_REPOSITORY_PUBLICATION=PASS"
            "REAL_MODE_HTTPS=PASS"
            "REAL_MODE_APT_UPDATE=PASS"
            "REAL_MODE_APT_INSTALL=PASS"
            "REAL_MODE_APT_UPGRADE=PASS"
            "REAL_MODE_PROMOTION=PASS"
            "REAL_MODE_SNAPSHOT=PASS"
            "REAL_MODE_ROLLBACK=PASS"
            "REAL_MODE_TAMPER_MATRIX=PASS"
            "REAL_MODE_KEY_RECOVERY=PASS"
            "REAL_MODE_KEY_REVOCATION=PASS"
            "REAL_MODE_EVIDENCE_COLLECTION=PASS"
          )
          for marker in "${REQUIRED_MARKERS[@]}"; do
            if ! grep -q "$marker" integration.log; then
              echo "[ERROR] Missing required evidence marker: $marker" >&2
              exit 1
            fi
            echo "[PASS] Verified evidence marker: $marker"
          done

      - name: Validate Local Real-Mode Stage Result Records
        run: |
          RESULTS_DIR="infra/package-staging/results/run-real-local-001"
          STAGE_FILES=(
            "repository-publication-result.json"
            "https-result.json"
            "apt-update-result.json"
            "install-result.json"
            "upgrade-result.json"
            "promotion-result.json"
            "snapshot-result.json"
            "rollback-result.json"
            "tamper-rejection-result.json"
            "recovery-drill-result.json"
            "revocation-drill-result.json"
          )
          for f in "${STAGE_FILES[@]}"; do
            filepath="$RESULTS_DIR/$f"
            if [[ ! -f "$filepath" ]]; then
              echo "[ERROR] Missing required stage result file: $filepath" >&2
              exit 1
            fi
            python3 tests/infrastructure/validate-real-mode-evidence.py "$filepath"
          done
          echo "LOCAL_REAL_MODE_INTEGRATION=PASS"

      - name: Cleanup Integration Containers
        if: always()
        run: |
          docker rm -f genixbit-staging-signer genixbit-staging-repo-host genixbit-staging-client 2>/dev/null || true

      - name: Upload Integration Evidence & Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-mode-staging-integration-evidence
          path: |
            integration.log
            infra/package-staging/results/run-real-local-001/*.json
          retention-days: 7

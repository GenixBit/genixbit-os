name: Package Infrastructure Validation

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'test/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-package-infrastructure:
    name: Package Infrastructure Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install ShellCheck, GnuPG, APT and Packaging tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck jq gnupg gpgv apt-utils dpkg-dev devscripts lintian python3-jsonschema

      - name: Validate shell syntax for repository tooling
        run: |
          bash -n tools/repository/lib/safety.sh
          bash -n tools/repository/*.sh
          bash -n tests/repository/*.sh

      - name: Run ShellCheck on repository tooling & tests
        run: |
          shellcheck -x tools/repository/lib/safety.sh
          shellcheck -x tools/repository/*.sh
          shellcheck -x tests/repository/*.sh

      - name: Test path safety library rules
        run: |
          bash tests/repository/test-path-safety.sh

      - name: Run negative security tests
        run: |
          bash tests/repository/test-negative-security.sh

      - name: Run end-to-end signed repository lifecycle test
        run: |
          bash tests/repository/test-signed-repository-lifecycle.sh

      - name: Validate JSON manifest schemas
        run: |
          jq . docs/schemas/*.json

      - name: Verify absence of committed private keys or secrets
        run: |
          if find . -type f \( -name "*.pem" -o -name "*.key" -o -name "*.sec" -o -name "secring.gpg" \) -not -path "./.git/*" | grep .; then
            echo "Error: Detected committed private key file!" >&2
            exit 1
          fi

      - name: Verify absence of tracked build artifacts (.deb, .dsc, .key, .pgp)
        run: |
          if git ls-files | grep -E '\.(deb|dsc|changes|buildinfo|key|sec|pem)$'; then
            echo "Error: Detected tracked build artifacts in git repository!" >&2
            exit 1
          fi

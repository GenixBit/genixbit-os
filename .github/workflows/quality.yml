name: Repository Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Shell and repository validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Validate Bash syntax
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' scripts < <(git ls-files -z '*.sh')
          if ((${#scripts[@]} == 0)); then
            echo 'No shell scripts found.'
            exit 0
          fi
          for script in "${scripts[@]}"; do
            echo "Checking syntax: $script"
            bash -n "$script"
          done

      - name: Audit shell scripts with ShellCheck
        shell: bash
        run: |
          set -uo pipefail
          mapfile -d '' scripts < <(git ls-files -z '*.sh')
          if ((${#scripts[@]} == 0)); then
            echo 'No shell scripts found.'
            exit 0
          fi
          if ! shellcheck --severity=error "${scripts[@]}"; then
            echo '::warning::ShellCheck found inherited error-level issues. Bash syntax remains blocking; ShellCheck remediation will be handled in a dedicated shell-hardening change.'
          fi

      - name: Reject generated artifacts and private material
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$({
            git ls-files | grep -E '(^|/)(new_building_os|image|dist)(/|$)' || true
            git ls-files | grep -E '\.(iso|img|p12|pfx|pem|key)$' || true
            git ls-files | grep -E '(^|/)\.env($|\.)' || true
          } | sort -u)"
          if [[ -n "$forbidden" ]]; then
            echo 'Forbidden generated artifacts or private material are tracked:'
            echo "$forbidden"
            exit 1
          fi

      - name: Reject local filesystem links
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE \
            'file:///Users/|/Users/manojnandanwar/' \
            -- \
            '*.md' '*.yml' '*.yaml' \
            ':(exclude).github/workflows/quality.yml'; then
            echo 'Local filesystem references must not be committed.'
            exit 1
          fi

      - name: Verify required legal and attribution files
        shell: bash
        run: |
          set -euo pipefail
          for file in LICENSE OSS.md UPSTREAM.md; do
            test -s "$file" || {
              echo "Required file is missing or empty: $file"
              exit 1
            }
          done

      - name: Verify GenixBit OS identity
        shell: bash
        run: |
          set -euo pipefail
          grep -Fx 'export TARGET_NAME="genixbitos"' args.sh
          grep -Fx 'export TARGET_BUSINESS_NAME="GenixBitOS"' args.sh
          grep -E '^export TARGET_BUILD_VERSION="' args.sh


      - name: Scan for obvious credential patterns
        shell: bash
        run: |
          set -euo pipefail
          patterns='AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{30,}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY'
          if git grep -nE "$patterns" -- . ':(exclude).github/workflows/quality.yml'; then
            echo 'A possible credential or private key was found.'
            exit 1
          fi

      - name: Validate release evidence status schema
        shell: bash
        run: bash tools/validation/check-release-evidence.sh

      - name: Test release evidence gate behavior
        shell: bash
        run: bash tools/validation/test-release-evidence.sh

      - name: Validate release version consistency
        shell: bash
        run: bash tools/validation/check-release-version-consistency.sh

      - name: Test release version consistency check behavior
        shell: bash
        run: bash tools/validation/test-release-version-consistency.sh

      - name: Validate release manifest
        shell: bash
        run: bash tools/validation/check-release-manifest.sh

      - name: Test release manifest check behavior
        shell: bash
        run: bash tools/validation/test-release-manifest.sh

      - name: Validate upstream branding audit
        shell: bash
        run: bash tools/validation/check-upstream-branding-audit.sh

      - name: Validate package migration integrity
        shell: bash
        run: bash tools/validation/check-package-migration-ci.sh

      - name: Test upstream branding audit check behavior
        shell: bash
        run: bash tools/validation/test-upstream-branding-audit.sh

      - name: Test candidate retirement and ISO validation negative behavior
        shell: bash
        run: bash tools/validation/test-candidate-retirement-negative.sh

      - name: Test immutable reference pointers negative behavior
        shell: bash
        run: bash tools/validation/test-immutable-pointers-negative.sh

      - name: Validate 0.3.0 release gate JSON
        shell: bash
        run: bash tools/validation/check-release-gate.sh

      - name: Test release gate negative behavior
        shell: bash
        run: bash tools/validation/test-release-gate-negative.sh

      - name: Test evidence collector negative behavior
        shell: bash
        run: bash tools/validation/test-evidence-collector-negative.sh




      - name: Enforce completed candidate validation
        if: >-
          github.event_name == 'pull_request' &&
          (startsWith(github.head_ref, 'test/validate-') ||
           startsWith(github.event.pull_request.title, 'test: validate '))
        run: |
          bash tools/validation/check-release-evidence.sh --require-complete
          bash tools/validation/check-release-evidence.sh --verify-git-candidate
          bash tools/validation/check-release-manifest.sh
          # Run version consistency checker, including --iso if an ISO is present
          ISO_FILE=$(find dist -name "*.iso" 2>/dev/null | head -n 1 || true)
          if [[ -n "$ISO_FILE" && -f "$ISO_FILE" ]]; then
            bash tools/validation/check-release-version-consistency.sh --iso "$ISO_FILE"
          else
            bash tools/validation/check-release-version-consistency.sh
          fi

      - name: Confirm CI scope
        run: echo 'Repository checks completed. Full ISO builds require a compatible Ubuntu 26.04 amd64 environment.'

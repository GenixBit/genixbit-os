name: Feature Request
description: Suggest an idea or feature for GenixBit OS
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggesting a new feature for GenixBit OS? We'd love to hear your ideas!

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: Is your feature request related to a problem or specific developer use case?
      placeholder: Describe the problem or goal you are trying to achieve...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Feature / Solution
      description: Describe the solution or feature you would like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, links, screenshots, or mockup diagrams.
    validations:
      required: false
